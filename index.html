<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FN Multi Stream Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>FN Multi Stream Hub</h1>
    <p>Watch multiple Twitch streams at once.</p>
  </header>

  <main>
    <section class="controls">
      <input id="streamInput" type="text" placeholder="Enter Twitch name, ex: clix" />
      <button onclick="addStream()">Add Stream</button>
      <button onclick="clearStreams()">Clear All</button>
    </section>

    <section id="streamGrid" class="stream-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
